# razad-api.conf
# Reference nginx config to put nginx in front of the razad daemon's API and
# embedded UI. The daemon listens on 127.0.0.1:8080 by default; this config
# listens on 80/443 and reverse-proxies to it.
#
# Copy to /etc/nginx/sites-available/razad-api, symlink to sites-enabled/,
# then `nginx -t && systemctl reload nginx`.
#
# This file is documentation-grade — the daemon itself does not parse it.
# It is kept in sync with the daemon's listen address and WebSocket route
# via the test in internal/install/nginx_test.go.

upstream razad_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Plain HTTP — terminates here and redirects to HTTPS except for the ACME
# challenge path used by certbot during initial certificate issuance.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 64m;

    # API and embedded UI both flow through here.
    location / {
        proxy_pass         http://razad_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # WebSocket route for live log streaming.
    location /ws {
        proxy_pass         http://razad_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_read_timeout 86400s;
    }
}

# Connection upgrade map for WebSocket support. Place in /etc/nginx/conf.d/
# or include from this file via `include /etc/nginx/conf.d/connection_upgrade.conf;`.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
